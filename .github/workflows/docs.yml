name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'cadre-docs' }}

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm --dir docs install --frozen-lockfile
      - name: Lint
        run: pnpm --dir docs lint
      - name: Typecheck
        run: pnpm --dir docs typecheck
      - name: Build static export
        run: pnpm --dir docs build
      - name: Ensure Cloudflare Pages project
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          pnpm exec wrangler pages project list --json > "$RUNNER_TEMP/cloudflare-pages-projects.json"
          if node - "$CLOUDFLARE_PAGES_PROJECT_NAME" "$RUNNER_TEMP/cloudflare-pages-projects.json" <<'NODE'
          const fs = require("node:fs");
          const [, , projectName, projectsPath] = process.argv;
          const payload = JSON.parse(fs.readFileSync(projectsPath, "utf8"));
          const projects = Array.isArray(payload) ? payload : payload.result ?? payload.items ?? [];
          process.exit(projects.some((project) => project.name === projectName) ? 0 : 1);
          NODE
          then
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT_NAME} already exists."
          else
            pnpm exec wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT_NAME" --production-branch=main
          fi
      - name: Deploy Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME"
