name: Deploy Docs
run-name: Deploy docs - ${{ inputs.ref }}

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy docs from.
        required: true
        default: main
      production_branch:
        description: Cloudflare Pages production branch name.
        required: false
        default: main
  workflow_call:
    inputs:
      ref:
        description: Branch, tag, or commit SHA to deploy docs from.
        required: true
        type: string
      production_branch:
        description: Cloudflare Pages production branch name.
        required: false
        type: string
        default: main

permissions:
  contents: read

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'cadre-docs' }}
  CLOUDFLARE_PAGES_PRODUCTION_BRANCH: ${{ inputs.production_branch || vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH || 'main' }}

concurrency:
  group: docs-deploy-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  docs:
    name: Deploy docs from selected ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint docs
        run: pnpm --filter cadre-docs lint
      - name: Typecheck docs
        run: pnpm --filter cadre-docs typecheck
      - name: Build static export
        run: pnpm --filter cadre-docs build
      - name: Ensure Cloudflare Pages project
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          create_log="$RUNNER_TEMP/cloudflare-pages-project-create.log"
          if pnpm exec wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT_NAME" --production-branch="$CLOUDFLARE_PAGES_PRODUCTION_BRANCH" >"$create_log" 2>&1; then
            cat "$create_log"
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT_NAME} created."
          else
            if grep -q "A project with this name already exists" "$create_log"; then
              cat "$create_log"
              echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT_NAME} already exists."
            else
              cat "$create_log" >&2
              exit 1
            fi
          fi
      - name: Deploy Cloudflare Pages production
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying docs from ${GITHUB_SHA} as Cloudflare Pages branch ${CLOUDFLARE_PAGES_PRODUCTION_BRANCH}."
          pnpm exec wrangler pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="$CLOUDFLARE_PAGES_PRODUCTION_BRANCH"
