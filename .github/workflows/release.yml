name: Release
run-name: Release - ${{ github.event.release.tag_name || github.ref_name }}

on:
  release:
    types: [published]

permissions:
  contents: read

env:
  CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME || 'cadre-docs' }}

concurrency:
  group: release-${{ github.event.release.id || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish NPM package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./harness/package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match cadre-ai package version ${package_version}." >&2
            exit 1
          fi
      - name: Check harness package
        run: pnpm --filter cadre-ai check
      - name: Pack dry-run
        run: pnpm --filter cadre-ai pack --dry-run
      - name: Publish cadre-ai
        working-directory: harness
        run: npm publish --access public --provenance

  docs:
    name: Run docs pipeline
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint docs
        run: pnpm --filter cadre-docs lint
      - name: Typecheck docs
        run: pnpm --filter cadre-docs typecheck
      - name: Build static export
        run: pnpm --filter cadre-docs build
      - name: Ensure Cloudflare Pages project
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          create_log="$RUNNER_TEMP/cloudflare-pages-project-create.log"
          if pnpm exec wrangler pages project create "$CLOUDFLARE_PAGES_PROJECT_NAME" --production-branch=main >"$create_log" 2>&1; then
            cat "$create_log"
            echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT_NAME} created."
          else
            if grep -q "A project with this name already exists" "$create_log"; then
              cat "$create_log"
              echo "Cloudflare Pages project ${CLOUDFLARE_PAGES_PROJECT_NAME} already exists."
            else
              cat "$create_log" >&2
              exit 1
            fi
          fi
      - name: Deploy Cloudflare Pages
        working-directory: docs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler pages deploy out --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME"
