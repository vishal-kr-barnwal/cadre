name: Release
run-name: Release - ${{ github.event.release.tag_name || github.ref_name }}

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.id || github.run_id }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish NPM package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - name: Update npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify release tag matches package version
        run: |
          package_version="$(node -p "require('./harness/package.json').version")"
          release_version="${GITHUB_REF_NAME#v}"
          release_version="${release_version#release-}"
          if [ "$package_version" != "$release_version" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match cadre-ai package version ${package_version}." >&2
            exit 1
          fi
      - name: Check harness package
        run: pnpm --filter cadre-ai check
      - name: Pack dry-run
        run: pnpm --filter cadre-ai pack --dry-run
      - name: Publish cadre-ai
        working-directory: harness
        run: npm publish --access public --provenance

  docs:
    name: Run docs pipeline
    needs: publish-npm
    uses: ./.github/workflows/docs.yml
    with:
      ref: ${{ github.ref_name }}
      production_branch: ${{ vars.CLOUDFLARE_PAGES_PRODUCTION_BRANCH || 'main' }}
    secrets: inherit
