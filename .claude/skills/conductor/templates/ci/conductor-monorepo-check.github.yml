# Conductor monorepo drift gate (GitHub Actions).
#
# Scaffolded into the repo at .github/workflows/conductor-monorepo-check.yml.
# This is the OPTIONAL drift-gate half of the PR-open / CI hook: it guards the
# "edit canonical -> regenerate -> commit" contract for the generated command
# sets.
#
# What it does: on every pull_request it checks out the repo and runs
#   1. `bash scripts/generate-commands.sh --check` — regenerates the per-platform
#      command sets (.codex/.cursor/.agent/.github/prompts) into a scratch dir and
#      fails if the committed output is STALE. The fix is always: edit the
#      canonical .claude/commands/ source, re-run `bash scripts/generate-commands.sh`,
#      and commit the regenerated trees.
#   2. `bash -n scripts/*.sh` — a shell syntax check (parse-only, runs nothing) of
#      every script under scripts/, so a broken generator/installer can't merge.
#
# Keep this minimal: no Beads, no `bd` — the task graph is not part of CI. The
# only tools needed are bash + jq + git, all present on ubuntu-latest.

name: conductor-monorepo-check

on:
  pull_request:

concurrency:
  group: conductor-monorepo-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check generated command sets are not stale
        # Fails if .claude/commands/ was edited without regenerating the
        # per-platform command sets. Fix: re-run generate-commands.sh and commit.
        run: bash scripts/generate-commands.sh --check

      - name: Shell syntax check
        # Parse-only (-n) — validates every script without executing it.
        run: bash -n scripts/*.sh
