# Cadre monorepo drift gate (GitHub Actions).
#
# Scaffolded into the repo at .github/workflows/cadre-monorepo-check.yml.
# This is the OPTIONAL drift-gate half of the PR-open / CI hook: it guards the
# "edit canonical -> regenerate -> commit" contract for the generated skill
# and plugin bundles.
#
# What it does: on every pull_request it checks out the repo and runs
#   1. `pnpm check` — builds runtime JS from TypeScript, verifies generated
#      Claude/Codex skill/plugin bundles in a scratch dir, and runs tests. It
#      fails if committed output is STALE. The fix is always: edit the master
#      workflow protocols/source, re-run `pnpm generate`, and commit the
#      regenerated trees.
#   2. `bash -n scripts/*.sh` — a shell syntax check (parse-only, runs nothing) of
#      every script under scripts/, so a broken generator/helper can't merge.
#   3. agent context parity — when `scripts/check-agent-context.sh` exists, asserts
#      AGENTS.md and CLAUDE.md both carry the team-scale safety rules.
#   4. tracks.md freshness — regenerates cadre/tracks.md from each track's
#      metadata.json.status (the source of truth) into a scratch file and fails if
#      the committed index is STALE or hand-edited. The fix is always:
#      `/cadre-status --regen-index` (never hand-merge tracks.md markers).
#   5. .gitattributes guard (shared mode only) — asserts the required `merge=ours`
#      lines exist so the control-plane merge contract isn't silently dropped.
#   6. review gate (track PRs only) — asserts the track's metadata.review cleared:
#      verdict approved, no blocking findings, no disallowed self-review, and
#      reviewed_sha is present. (SHA-equality against the PR head is only a
#      non-blocking WARNING — ship/land rebase rewrites the tip, so CI cannot match
#      the ephemeral pre-rebase tip; the hard out-of-band-push guard runs at push
#      time in /cadre-ship and /cadre-land.)
#
# Keep this minimal: no Beads, no `bd` — the task graph is not part of CI. The
# only tools needed are bash + jq + git, all present on ubuntu-latest.

name: cadre-monorepo-check

on:
  pull_request:

concurrency:
  group: cadre-monorepo-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install PNPM dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Check generated skill bundles are not stale
        # Fails if skill protocol sources changed without regenerating the
        # per-platform skill bundles. Fix: re-run pnpm generate and commit.
        run: pnpm check

      - name: Shell syntax check
        # Parse-only (-n) — validates every script without executing it.
        run: bash -n scripts/*.sh

      - name: Agent context carries team-scale rules
        run: |
          if [ -f scripts/check-agent-context.sh ]; then
            bash scripts/check-agent-context.sh
          else
            echo "No scripts/check-agent-context.sh — skipping agent-context gate."
          fi

      - name: tracks.md index is fresh
        # cadre/tracks.md is a DERIVED cache, not an authority: it must equal the
        # output of the regen-index script, which rebuilds it from each track's
        # metadata.json.status (the single source of truth). This catches a stale
        # index or a hand-edited/hand-merged marker. Fix: `/cadre-status
        # --regen-index` and commit. Skip cleanly on projects with no cadre/ index
        # yet (the gate only applies once Cadre is initialized).
        run: |
          set -euo pipefail
          if [ ! -f cadre/tracks.md ]; then
            echo "No cadre/tracks.md — skipping freshness gate (project not initialized)."
            exit 0
          fi
          expected="$(mktemp)"
          cp cadre/tracks.md "$expected"
          # Regenerate in place from metadata, then diff against the committed copy.
          bash templates/scripts/cadre-regen-index.sh .
          if ! diff -u "$expected" cadre/tracks.md; then
            echo "::error::cadre/tracks.md is STALE or hand-edited. Run '/cadre-status --regen-index' and commit the result — never hand-merge tracks.md markers."
            exit 1
          fi
          echo "cadre/tracks.md matches metadata.json.status."

      - name: .gitattributes merge contract present (shared mode)
        # In shared sync mode the control-plane merge contract lives in
        # .gitattributes (the `merge=ours` lines for the Dolt DB and ephemeral
        # parallel_state.json). Assert those lines exist so they can't be silently
        # dropped. NOTE: the per-clone merge DRIVER itself (`git config
        # merge.ours.driver true`) CANNOT be CI-asserted — CI checks out a fresh
        # clone and never performs a Cadre merge, so that local config is absent by
        # design and self-heals via the sync preamble. We only check the committed
        # .gitattributes lines here. Gated on sync_mode == "shared"; a no-op in
        # local mode.
        run: |
          set -euo pipefail
          mode="$(jq -r '.sync_mode // "local"' cadre/config.json 2>/dev/null || echo local)"
          if [ "$mode" != "shared" ]; then
            echo "sync_mode is '$mode' (not shared) — skipping .gitattributes guard."
            exit 0
          fi
          missing=0
          for line in \
            '.beads/** merge=ours' \
            'cadre/tracks/**/parallel_state.json  merge=ours'; do
            # Match on the (path, merge=ours) pair, tolerant of whitespace runs.
            pat="$(printf '%s' "$line" | sed 's/  */[[:space:]][[:space:]]*/g')"
            if ! grep -Eq "$pat" .gitattributes 2>/dev/null; then
              echo "::error::Missing required shared-mode .gitattributes line: $line"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo ".gitattributes contains the required merge=ours lines."

  review-gate:
    # Track PRs must clear review before they can merge. A "track PR" is one whose
    # head branch is `track/<track_id>`; non-track PRs (docs, infra, the canonical
    # command edits this very file guards) skip this job. The gate re-asserts in CI
    # what /cadre-ship and /cadre-land enforce at push time, closing the
    # out-of-band-push hole: someone could push a new commit onto an
    # already-approved branch and open/merge a PR without re-running /cadre-review.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Review verdict cleared for track PR
        env:
          # The PR HEAD commit (the tip being merged). github.event.pull_request
          # .head.sha is the unmerged source tip, which is what reviewed_sha pins.
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # Only track branches are gated.
          case "$HEAD_REF" in
            track/*) track_id="${HEAD_REF#track/}" ;;
            *)
              echo "Head branch '$HEAD_REF' is not a track branch — review gate not applicable."
              exit 0 ;;
          esac
          META="cadre/tracks/$track_id/metadata.json"
          if [ ! -f "$META" ]; then
            echo "::error::Track branch '$HEAD_REF' has no $META — cannot verify review. Did the track metadata get committed?"
            exit 1
          fi
          verdict=$(jq -r '.review.verdict // "absent"' "$META")
          blocking=$(jq -r '.review.blocking_count // 0' "$META")
          self_reviewed=$(jq -r '.review.self_reviewed // false' "$META")
          reviewed_sha=$(jq -r '.review.reviewed_sha // ""' "$META")
          require_second=$(jq -r '.require_second_reviewer // false' cadre/config.json 2>/dev/null || echo false)

          if [ "$verdict" = "absent" ]; then
            echo "::error::Track '$track_id' has no recorded review verdict. Run /cadre-review before merging."
            exit 1
          fi
          if [ "$verdict" != "approved" ] || [ "$blocking" -gt 0 ]; then
            echo "::error::Track '$track_id' has not cleared review (verdict: $verdict, blocking findings: $blocking). Resolve findings and re-run /cadre-review."
            exit 1
          fi
          if [ "$require_second" = "true" ] && [ "$self_reviewed" = "true" ]; then
            echo "::error::Track '$track_id' has only a self-review but require_second_reviewer is set. A different reviewer must approve."
            exit 1
          fi
          # reviewed_sha should be present (it pins the verdict to a reviewed commit).
          if [ -z "$reviewed_sha" ]; then
            echo "::error::Track '$track_id' is missing review.reviewed_sha. Re-run /cadre-review to pin the verdict to a commit."
            exit 1
          fi
          # reviewed_sha is the PRE-REBASE reviewed commit. /cadre-ship and /cadre-land
          # rebase track/<id> onto main before pushing, which REWRITES the branch tip —
          # so the PR head here is the post-rebase commit and will NOT equal reviewed_sha
          # on a perfectly legitimate ship. CI cannot see the ephemeral local pre-rebase
          # tip that ship/land compare against, so a strict equality here would
          # false-block every shipped track. The HARD enforcement lives at push time in
          # /cadre-ship and /cadre-land (they compare the pre-rebase tip). Here we only
          # WARN on a mismatch (non-blocking advisory).
          if [ "$reviewed_sha" != "$PR_HEAD_SHA" ]; then
            echo "::warning::PR head $PR_HEAD_SHA differs from review.reviewed_sha $reviewed_sha — expected after a rebase-on-ship. Ensure no UN-reviewed code landed after review; the push-time guard in /cadre-ship|/cadre-land enforces this."
          fi
          echo "Track '$track_id' review cleared: approved, 0 blocking, reviewed_sha present."
