# Cadre target-project drift gate (GitHub Actions).
#
# Scaffolded by cadre-setup into .github/workflows/cadre-monorepo-check.yml.
# This template is for Cadre-initialized product repositories, not the Cadre
# harness package. It intentionally avoids harness-package drift gates,
# generated plugin checks, and generator maintenance commands.

name: cadre-monorepo-check

on:
  pull_request:

concurrency:
  group: cadre-monorepo-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cadre-project-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: tracks.md index is fresh
        run: |
          set -euo pipefail
          if [ ! -f cadre/tracks.md ]; then
            echo "No cadre/tracks.md — skipping freshness gate."
            exit 0
          fi
          body="$(mktemp)"
          expected="$(mktemp)"
          if [ -d cadre/tracks ]; then
            find cadre/tracks -mindepth 2 -maxdepth 2 -name metadata.json -print | sort | while read -r md; do
              jq -r '
                {new:"[ ]", in_progress:"[~]", completed:"[x]", blocked:"[!]", skipped:"[-]"} as $m
                | "## \($m[(.status // "new")] // "[ ]") Track: \(.name // .track_id)"
              ' "$md"
            done > "$body"
          else
            : > "$body"
          fi
          if grep -qF '<!-- cadre:index:start -->' cadre/tracks.md && grep -qF '<!-- cadre:index:end -->' cadre/tracks.md; then
            awk -v s='<!-- cadre:index:start -->' -v e='<!-- cadre:index:end -->' -v bf="$body" '
              index($0,s){print; while((getline line < bf) > 0) print line; close(bf); skip=1; next}
              index($0,e){skip=0}
              !skip{print}
            ' cadre/tracks.md > "$expected"
          else
            {
              cat cadre/tracks.md
              printf '%s\n' '<!-- cadre:index:start -->'
              cat "$body"
              printf '%s\n' '<!-- cadre:index:end -->'
            } > "$expected"
          fi
          if ! diff -u "$expected" cadre/tracks.md; then
            echo "::error::cadre/tracks.md is stale. Run cadre_mutate action regen_index through Cadre MCP and commit the result."
            exit 1
          fi
          echo "cadre/tracks.md matches metadata.json.status."

      - name: Shared sync merge contract present
        run: |
          set -euo pipefail
          mode="$(jq -r '.sync_mode // "local"' cadre/config.json 2>/dev/null || echo local)"
          if [ "$mode" != "shared" ]; then
            echo "sync_mode is '$mode' — skipping .gitattributes guard."
            exit 0
          fi
          missing=0
          for line in \
            '.beads/** merge=ours' \
            'cadre/tracks/**/parallel_state.json  merge=ours'; do
            pat="$(printf '%s' "$line" | sed 's/  */[[:space:]][[:space:]]*/g')"
            if ! grep -Eq "$pat" .gitattributes 2>/dev/null; then
              echo "::error::Missing required shared-mode .gitattributes line: $line"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1
          echo ".gitattributes contains the required shared-mode merge rules."

      - name: Configured project gate
        run: |
          set -euo pipefail
          if [ ! -f cadre/config.json ]; then
            echo "No cadre/config.json — skipping project gate."
            exit 0
          fi
          gate="$(jq -r '.ci_check_command // .check_command // .review_machine_gate_command // .machine_gate_command // .test_command // empty' cadre/config.json)"
          if [ -z "$gate" ]; then
            echo "No Cadre project gate command configured."
            exit 0
          fi
          echo "Running Cadre project gate: $gate"
          bash -lc "$gate"

      - name: Review verdict cleared for track PR
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          if [ ! -d cadre ]; then
            echo "No cadre/ directory — review gate not initialized."
            exit 0
          fi
          case "$HEAD_REF" in
            track/*) track_id="${HEAD_REF#track/}" ;;
            *)
              echo "Head branch '$HEAD_REF' is not a track branch — review gate not applicable."
              exit 0 ;;
          esac
          META="cadre/tracks/$track_id/metadata.json"
          if [ ! -f "$META" ]; then
            echo "::error::Track branch '$HEAD_REF' has no $META — cannot verify review."
            exit 1
          fi
          verdict="$(jq -r '.review.verdict // "absent"' "$META")"
          blocking="$(jq -r '.review.blocking_count // 0' "$META")"
          self_reviewed="$(jq -r '.review.self_reviewed // false' "$META")"
          reviewed_sha="$(jq -r '.review.reviewed_sha // ""' "$META")"
          require_second="$(jq -r '.require_second_reviewer // false' cadre/config.json 2>/dev/null || echo false)"
          if [ "$verdict" = "absent" ]; then
            echo "::error::Track '$track_id' has no recorded review verdict. Run cadre-review before merging."
            exit 1
          fi
          if [ "$verdict" != "approved" ] || [ "$blocking" -gt 0 ]; then
            echo "::error::Track '$track_id' has not cleared review (verdict: $verdict, blocking findings: $blocking)."
            exit 1
          fi
          if [ "$require_second" = "true" ] && [ "$self_reviewed" = "true" ]; then
            echo "::error::Track '$track_id' has only a self-review but require_second_reviewer is set."
            exit 1
          fi
          if [ -z "$reviewed_sha" ]; then
            echo "::error::Track '$track_id' is missing review.reviewed_sha. Re-run cadre-review."
            exit 1
          fi
          if [ "$reviewed_sha" != "$PR_HEAD_SHA" ]; then
            echo "::warning::PR head $PR_HEAD_SHA differs from review.reviewed_sha $reviewed_sha. This can be expected after ship/land rebases; Cadre enforces the hard pre-rebase guard during publication."
          fi
          echo "Track '$track_id' review cleared."
